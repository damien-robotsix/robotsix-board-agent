ci:
  autofix_prs: true
  autoupdate_schedule: monthly
  skip: [mypy]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: detect-private-key

  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check
        language: system
        types: [python]
        pass_filenames: false

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format --check
        language: system
        types: [python]
        pass_filenames: false

      - id: mypy
        name: mypy
        entry: uv run mypy src tests
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true

      - id: detect-secrets
        name: detect-secrets
        entry: uv run --with detect-secrets detect-secrets-hook --baseline .secrets.baseline
        language: system
        types: [text]

      - id: zizmor
        name: zizmor
        entry: zizmor
        language: system
        types: [yaml]
        files: ^\.github/workflows/
        pass_filenames: false
