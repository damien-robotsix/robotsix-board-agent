name: CI

on: [pull_request, push]

env:
  UV_FROZEN: "1"

permissions:
  contents: read

jobs:
  ci:
    permissions:
      contents: read
      security-events: write
    uses: damien-robotsix/robotsix-mill/.github/workflows/python-ci.yml@main
    with:
      run-deptry: false
      cov-package: robotsix_board_agent

  vulture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen
      - run: uv run vulture src/ vulture_whitelist.py
