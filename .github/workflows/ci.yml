name: CI

on: [pull_request, push]

env:
  UV_FROZEN: "1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  ci:
    permissions:
      contents: read
      security-events: write
    uses: damien-robotsix/robotsix-mill/.github/workflows/python-ci.yml@c3a9aa5d58116b96e5a0c36991b0b202986130f9 # main
    with:
      python-version: "3.14"
      cov-package: "robotsix_board_agent"
      install-extras: ""
      coverage-threshold: "60"

  codeql:
    permissions:
      contents: read
      security-events: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          languages: python
          queries: security-and-quality
      - uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v5
      - run: uv audit

  vulture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v5
      - run: uv sync --frozen
      - run: uv run vulture src/ vulture_whitelist.py

  completeness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v5
      - run: uv python install 3.14
      - run: uv sync --frozen --extra prod
      - run: uv run python scripts/completeness_check.py

  changelog-enforce:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dangoslen/changelog-enforcer@v3.7.0
        with:
          expectedLatestVersion: unreleased
          missingUpdateErrorMessage: >
            Please add a changelog entry under the '## [Unreleased]' heading in
            CHANGELOG.md describing your change. If this PR does not need a
            changelog entry, add the 'skip-changelog' label.
          skipLabels: "documentation, refactor, dependencies, skip-changelog"

  ruff-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v5
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  security:
    uses: damien-robotsix/robotsix-mill/.github/workflows/python-security.yml@c3a9aa5d58116b96e5a0c36991b0b202986130f9 # main
    with:
      install-extras: ""
      trufflehog-pr-diff: true
      trufflehog-extra-args: "--results=verified,unknown"
