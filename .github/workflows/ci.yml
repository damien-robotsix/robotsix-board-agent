name: CI

on: [pull_request, push]

env:
  UV_FROZEN: "1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  ci:
    uses: damien-robotsix/robotsix-mill/.github/workflows/python-ci.yml@main
    with:
      python-version: "3.12"
      cov-package: "robotsix_board_agent"
      install-extras: ""
      coverage-threshold: "60"

  codeql:
    permissions:
      contents: read
      security-events: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-and-quality
      - uses: github/codeql-action/analyze@v4

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv audit

  vulture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen
      - run: uv run vulture src/ vulture_whitelist.py

  security:
    uses: damien-robotsix/robotsix-mill/.github/workflows/python-security.yml@main
    with:
      install-extras: ""
      trufflehog-pr-diff: true
      trufflehog-extra-args: "--results=verified,unknown"
