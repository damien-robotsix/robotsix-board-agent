name: CI

on: [pull_request, push]

env:
  UV_FROZEN: "1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  ci:
    permissions:
      contents: read
      security-events: write
    uses: damien-robotsix/robotsix-mill/.github/workflows/python-ci.yml@c3a9aa5d58116b96e5a0c36991b0b202986130f9 # main
    with:
      python-version: "3.14"
      cov-package: "robotsix_board_agent"
      install-extras: ""
      coverage-threshold: "60"

  codeql:
    permissions:
      contents: read
      security-events: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1d96c772d19494a3b5c832cd2b073cdb3247de42 # v4
      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          languages: python
          queries: security-and-quality
      - uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1d96c772d19494a3b5c832cd2b073cdb3247de42 # v4
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
      - run: uv audit

  vulture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1d96c772d19494a3b5c832cd2b073cdb3247de42 # v4
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
      - run: uv sync --frozen
      - run: uv run vulture src/ vulture_whitelist.py

  completeness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1d96c772d19494a3b5c832cd2b073cdb3247de42 # v4
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
      - run: uv python install 3.14
      - run: uv sync --frozen --extra prod
      - run: uv run python scripts/completeness_check.py

  security:
    uses: damien-robotsix/robotsix-mill/.github/workflows/python-security.yml@c3a9aa5d58116b96e5a0c36991b0b202986130f9 # main
    with:
      install-extras: ""
      trufflehog-pr-diff: true
      trufflehog-extra-args: "--results=verified,unknown"
