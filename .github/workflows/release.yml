name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  actions: read

jobs:
  verify-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Verify tag matches pyproject.toml version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          TOML_VERSION=$(grep '^version = ' pyproject.toml | head -1 | sed 's/^version = "\(.*\)"/\1/')
          if [ "$TAG_VERSION" != "$TOML_VERSION" ]; then
            echo "Tag version '${TAG_VERSION}' does not match pyproject.toml version '${TOML_VERSION}'"
            exit 1
          fi
          echo "Tag version '${TAG_VERSION}' matches pyproject.toml version '${TOML_VERSION}'"

  sbom:
    needs: verify-tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false
      - name: Generate CycloneDX SBOM
        run: uv export --format cyclonedx --output-file sbom.json
      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: sbom.json

  release:
    needs: verify-tag
    permissions:
      contents: read
      id-token: write
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/python-release.yml@5cd8c1facb02299da618979e7a55f1953f9c075a # main
